<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #F8FAFC; }
        .bento-card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #F1F5F9; }
        .input-style { background: #F1F5F9; border: none; border-radius: 12px; padding: 10px; width: 100%; outline: none; font-size: 14px; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.3s; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-5 max-w-md mx-auto pb-32">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 overlay opacity-0 pointer-events-none z-40"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl sidebar translate-x-full p-6 overflow-y-auto">
        <h2 class="text-xl font-bold mb-6">Settings</h2>
        
        <div class="space-y-6">
            <section>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Base Rate ($)</label>
                <input type="number" id="base-rate-input" class="input-style font-bold mt-1" value="52.40">
            </section>

            <section>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Default Shift Hours</label>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Day/Aft</span>
                        <input type="number" step="0.5" id="hours-default" class="input-style" value="8.0">
                    </div>
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Night</span>
                        <input type="number" step="0.5" id="hours-night" class="input-style" value="10.0">
                    </div>
                </div>
            </section>

            <section>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Penalty Multipliers</label>
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Afternoon</span>
                        <input type="number" step="0.01" id="rate-afternoon" class="input-style" value="1.125">
                    </div>
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Night</span>
                        <input type="number" step="0.01" id="rate-night" class="input-style" value="1.15">
                    </div>
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Saturday</span>
                        <input type="number" step="0.01" id="rate-saturday" class="input-style" value="1.5">
                    </div>
                    <div>
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Sunday</span>
                        <input type="number" step="0.01" id="rate-sunday" class="input-style" value="1.75">
                    </div>
                </div>
            </section>

            <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">
                Save & Apply
            </button>
        </div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('nurseShifts')) || [];
        let deductions = JSON.parse(localStorage.getItem('nurseDeductions')) || [];
        
        // Updated Config to include standard hours
        let config = JSON.parse(localStorage.getItem('nurseConfig')) || { 
            baseRate: 52.40, 
            hasHecs: false,
            stdHours: { default: 8.0, night: 10.0 },
            penalties: { afternoon: 1.125, night: 1.15, saturday: 1.5, sunday: 1.75 }
        };

        // Logic for AI Scanner to use Settings
        async function handleRoster(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('scan-status').classList.remove('hidden');
            
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                const lines = text.toLowerCase().split('\n');
                let foundCount = 0;

                const patterns = [
                    { key: 'morning', label: 'Morning', val: 1.0, type: 'default' },
                    { key: 'afternoon', label: 'Afternoon', val: 'afternoon', type: 'default' },
                    { key: 'night', label: 'Night', val: 'night', type: 'night' },
                    { key: 'saturday', label: 'Saturday', val: 'saturday', type: 'default' },
                    { key: 'sunday', label: 'Sunday', val: 'sunday', type: 'default' }
                ];

                lines.forEach(line => {
                    patterns.forEach(p => {
                        if (line.includes(p.key)) {
                            // Use the specific night hours or the default hours from settings
                            const shiftHours = (p.type === 'night') ? config.stdHours.night : config.stdHours.default;
                            
                            shifts.push({ 
                                label: `AI: ${p.label}`, 
                                multiplier: p.val, 
                                hours: shiftHours 
                            });
                            foundCount++;
                        }
                    });
                });

                if (foundCount > 0) { 
                    updateUI(); 
                    switchTab('shifts'); 
                    alert(`Imported ${foundCount} shifts based on your standard ${config.stdHours.default}h & ${config.stdHours.night}h settings!`);
                }
            } finally { 
                document.getElementById('scan-status').classList.add('hidden'); 
            }
        }

        function saveSettings() {
            config.baseRate = parseFloat(document.getElementById('base-rate-input').value);
            config.stdHours = {
                default: parseFloat(document.getElementById('hours-default').value),
                night: parseFloat(document.getElementById('hours-night').value)
            };
            config.penalties = {
                afternoon: parseFloat(document.getElementById('rate-afternoon').value),
                night: parseFloat(document.getElementById('rate-night').value),
                saturday: parseFloat(document.getElementById('rate-saturday').value),
                sunday: parseFloat(document.getElementById('rate-sunday').value)
            };
            localStorage.setItem('nurseConfig', JSON.stringify(config));
            updateUI();
            toggleSidebar();
        }

        // ... Keep existing updateUI, switchTab, and addShift logic ...
        // Ensure updateUI() populates the sidebar fields on load
    </script>
</body>
</html>
