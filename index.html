<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NursePay Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E293B">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        .bento-card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #F1F5F9; }
        .input-style { background: #F1F5F9; border: none; border-radius: 12px; padding: 12px; width: 100%; outline: none; font-size: 14px; }
        .sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.3s; }
    </style>
</head>
<body class="p-5 max-w-md mx-auto pb-32">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 overlay opacity-0 pointer-events-none z-40"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl sidebar translate-x-full p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Pay Settings</h2>
            <button onclick="toggleSidebar()" class="text-slate-400 text-2xl">✕</button>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Base Hourly Rate ($)</label>
                <input type="number" id="base-rate-input" onchange="updateSettings()" class="input-style font-bold text-lg" value="52.40">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Student Debt (HECS/HELP)</label>
                <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl">
                    <input type="checkbox" id="hecs-input" onchange="updateSettings()" class="w-5 h-5 accent-blue-600">
                    <span class="text-sm font-medium text-slate-700">I have a HECS debt</span>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Display Mode</label>
                <select id="timeframe-input" onchange="updateSettings()" class="input-style font-medium">
                    <option value="weekly">Weekly Take-Home</option>
                    <option value="fortnightly" selected>Fortnightly Take-Home</option>
                    <option value="monthly">Monthly Take-Home</option>
                    <option value="yearly">Yearly Take-Home</option>
                </select>
            </div>
            
            <div class="pt-6 border-t border-slate-100">
                <p class="text-[10px] text-slate-400 leading-relaxed italic">Calculations based on 2025-2026 ATO Resident Tax Scales & 2% Medicare Levy.</p>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-center mb-6 mt-4">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">NursePay <span class="text-blue-500 text-sm">PRO</span></h1>
            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-tighter">Personal Payroll Auditor</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleSidebar()" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-lg">⚙️</button>
        </div>
    </header>

    <div class="bento-card p-8 mb-6 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
        <span id="display-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Fortnightly Take-Home</span>
        <div id="total-display" class="text-5xl font-bold text-slate-900 my-2 tracking-tighter">$0.00</div>
        <div class="flex justify-center gap-2 mt-2">
            <span id="shift-count" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">0 Shifts</span>
            <span id="tax-impact" class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase">Tax Ready</span>
        </div>
    </div>

    <div class="bento-card p-6 mb-6">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <select id="shift-type" class="input-style font-bold">
                <option value="1.0">Morning (1x)</option>
                <option value="1.125">Afternoon (1.125x)</option>
                <option value="1.15">Night (1.15x)</option>
                <option value="1.5">Saturday (1.5x)</option>
                <option value="1.75">Sunday (1.75x)</option>
                <option value="2.5">Public Hol (2.5x)</option>
            </select>
            <input type="number" id="shift-hours" class="input-style" placeholder="Hours (8.5)">
        </div>
        <button onclick="addShift()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-transform shadow-lg shadow-slate-200">
            Add to Fortnight
        </button>
    </div>

    <div class="flex justify-between items-end mb-4 px-2">
        <h3 class="font-bold text-slate-800">Current Log</h3>
        <button onclick="archiveFortnight()" class="text-blue-600 text-[11px] font-bold uppercase tracking-wider">Finish Fortnight →</button>
    </div>
    
    <div id="shift-list" class="space-y-3 mb-10"></div>

    <script>
        // --- State Management ---
        let shifts = JSON.parse(localStorage.getItem('nurseShifts')) || [];
        let config = JSON.parse(localStorage.getItem('nurseConfig')) || {
            baseRate: 52.40,
            hasHecs: false,
            timeframe: 'fortnightly'
        };

        // --- ATO Tax Engine (2025-2026 Resident Rates) ---
        function calculateNet(grossAnnual, hasHecs) {
            // Medicare Levy 2%
            const medicare = grossAnnual * 0.02;
            
            // PAYG Tax Brackets
            let tax = 0;
            if (grossAnnual > 190000) tax = 51638 + (grossAnnual - 190000) * 0.45;
            else if (grossAnnual > 135000) tax = 31288 + (grossAnnual - 135000) * 0.37;
            else if (grossAnnual > 45000) tax = 4288 + (grossAnnual - 45000) * 0.30;
            else if (grossAnnual > 18200) tax = (grossAnnual - 18200) * 0.16;

            // HECS/HELP (Simplified 2026 Thresholds)
            let hecs = 0;
            if (hasHecs) {
                if (grossAnnual > 179285) hecs = grossAnnual * 0.10;
                else if (grossAnnual > 125000) hecs = 8700 + (grossAnnual - 125000) * 0.17;
                else if (grossAnnual > 67000) hecs = (grossAnnual - 67000) * 0.15;
            }

            return grossAnnual - tax - medicare - hecs;
        }

        function updateUI() {
            // Update Sidebar UI to match state
            document.getElementById('base-rate-input').value = config.baseRate;
            document.getElementById('hecs-input').checked = config.hasHecs;
            document.getElementById('timeframe-input').value = config.timeframe;

            const list = document.getElementById('shift-list');
            list.innerHTML = '';
            
            let totalGrossFortnight = 0;
            shifts.forEach((s, i) => {
                const shiftGross = config.baseRate * s.multiplier * s.hours;
                totalGrossFortnight += shiftGross;
                
                const card = document.createElement('div');
                card.className = 'bento-card p-4 flex justify-between items-center';
                card.innerHTML = `
                    <div>
                        <div class="text-xs font-bold text-slate-800">${s.label}</div>
                        <div class="text-[10px] text-slate-400">${s.hours} hours @ $${(config.baseRate * s.multiplier).toFixed(2)}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-sm text-slate-700">$${shiftGross.toFixed(2)}</span>
                        <button onclick="deleteShift(${i})" class="text-slate-300">✕</button>
                    </div>
                `;
                list.appendChild(card);
            });

            // Calculate annual projection based on this fortnight
            const annualGross = totalGrossFortnight * 26;
            const annualNet = calculateNet(annualGross, config.hasHecs);

            // Convert to selected timeframe
            let displayVal = 0;
            const label = document.getElementById('display-label');
            if(config.timeframe === 'weekly') { displayVal = annualNet / 52; label.innerText = "Weekly Take-Home"; }
            else if(config.timeframe === 'fortnightly') { displayVal = annualNet / 26; label.innerText = "Fortnightly Take-Home"; }
            else if(config.timeframe === 'monthly') { displayVal = annualNet / 12; label.innerText = "Monthly Take-Home"; }
            else { displayVal = annualNet; label.innerText = "Yearly Take-Home"; }

            document.getElementById('total-display').innerText = "$" + displayVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('shift-count').innerText = `${shifts.length} Shifts`;
            
            localStorage.setItem('nurseShifts', JSON.stringify(shifts));
            localStorage.setItem('nurseConfig', JSON.stringify(config));
        }

        // --- Logic Functions ---
        function addShift() {
            const select = document.getElementById('shift-type');
            const hours = document.getElementById('shift-hours').value;
            if(!hours) return;
            shifts.push({
                label: select.options[select.selectedIndex].text.split(' (')[0],
                multiplier: parseFloat(select.value),
                hours: parseFloat(hours)
            });
            document.getElementById('shift-hours').value = '';
            updateUI();
        }

        function updateSettings() {
            config.baseRate = parseFloat(document.getElementById('base-rate-input').value) || 0;
            config.hasHecs = document.getElementById('hecs-input').checked;
            config.timeframe = document.getElementById('timeframe-input').value;
            updateUI();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sb.classList.contains('translate-x-full');
            
            if(isOpen) {
                sb.classList.add('translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            } else {
                sb.classList.remove('translate-x-full');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        function deleteShift(i) { shifts.splice(i, 1); updateUI(); }

        window.onload = updateUI;
    </script>
</body>
</html>
