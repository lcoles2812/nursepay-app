<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NursePay Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #F8FAFC; }
        .bento-card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #F1F5F9; }
        .input-style { background: #F1F5F9; border: none; border-radius: 12px; padding: 10px; width: 100%; outline: none; font-size: 14px; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.3s; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-5 max-w-md mx-auto pb-32">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 overlay opacity-0 pointer-events-none z-40"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl sidebar translate-x-full p-6 overflow-y-auto flex flex-col">
        <div class="flex-grow">
            <h2 class="text-xl font-bold mb-6">Settings</h2>
            <div class="space-y-6">
                <section>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Base Rate ($)</label>
                    <input type="number" id="base-rate-input" class="input-style font-bold mt-1">
                </section>
                <section>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Standard Shift Hours</label>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <div>
                            <span class="text-[9px] text-slate-500 font-bold uppercase">Day/Late</span>
                            <input type="number" step="0.5" id="hours-default" class="input-style">
                        </div>
                        <div>
                            <span class="text-[9px] text-slate-500 font-bold uppercase">Night</span>
                            <input type="number" step="0.5" id="hours-night" class="input-style">
                        </div>
                    </div>
                </section>
                <section>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Penalty Multipliers</label>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <div><span class="text-[9px] text-slate-500 font-bold uppercase">Aft</span><input type="number" step="0.01" id="rate-afternoon" class="input-style"></div>
                        <div><span class="text-[9px] text-slate-500 font-bold uppercase">Night</span><input type="number" step="0.01" id="rate-night" class="input-style"></div>
                        <div><span class="text-[9px] text-slate-500 font-bold uppercase">Sat</span><input type="number" step="0.01" id="rate-saturday" class="input-style"></div>
                        <div><span class="text-[9px] text-slate-500 font-bold uppercase">Sun</span><input type="number" step="0.01" id="rate-sunday" class="input-style"></div>
                    </div>
                </section>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">Save & Apply</button>
            </div>
        </div>
        <div class="mt-8 pt-6 border-t border-slate-100">
            <button onclick="resetApp()" class="w-full bg-red-50 text-red-600 text-[10px] font-bold py-3 rounded-xl uppercase tracking-widest">Reset All Data</button>
        </div>
    </div>

    <header class="flex justify-between items-center mb-6 mt-4">
        <div>
            <h1 class="text-2xl font-bold">NursePay <span class="text-blue-500 text-sm">PRO</span></h1>
            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">2026 Audit Tool</p>
        </div>
        <button onclick="toggleSidebar()" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">⚙️</button>
    </header>

    <div class="bento-card p-8 mb-6 text-center border-b-4 border-blue-500">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fortnightly Take-Home</span>
        <div id="total-display" class="text-5xl font-bold text-slate-900 my-2 tracking-tighter">$0.00</div>
        <div class="flex justify-center gap-2 mt-2">
            <span id="shift-count" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">0 Shifts</span>
            <span id="tax-return-est" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">$0 Tax Bonus</span>
        </div>
    </div>

    <div class="flex gap-4 mb-4 px-2 border-b border-slate-100">
        <button onclick="switchTab('shifts')" id="tab-shifts" class="text-xs font-bold border-b-2 border-slate-900 pb-2">Logged</button>
        <button onclick="switchTab('roster')" id="tab-roster" class="text-xs font-bold text-slate-400 pb-2">AI Scan</button>
        <button onclick="switchTab('deductions')" id="tab-deductions" class="text-xs font-bold text-slate-400 pb-2">Expenses</button>
    </div>

    <div id="view-shifts">
        <div class="flex justify-between items-center mb-4 px-1">
            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Audit List</h4>
            <button onclick="clearShifts()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Clear All</button>
        </div>
        <div id="shift-list" class="space-y-3"></div>
        
        <div class="mt-6 bento-card p-5">
            <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">Add Manual</h4>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="shift-type" class="input-style font-bold">
                    <option value="1.0">Morning</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="night">Night</option>
                    <option value="saturday">Saturday</option>
                    <option value="sunday">Sunday</option>
                </select>
                <input type="number" id="shift-hours" class="input-style" placeholder="Hrs">
            </div>
            <button onclick="addShift()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Add to Audit</button>
        </div>
    </div>

    <div id="view-roster" class="hidden">
        <div class="bento-card p-6 text-center">
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">📸</div>
            <h3 class="font-bold">Scan Calendar</h3>
            <p class="text-[10px] text-slate-400 mb-6 px-4">Detects 'Day', 'Late', 'LE', and 'Night' for Jan 2026.</p>
            <input type="file" id="roster-upload" accept="image/*" class="hidden" onchange="handleRoster(event)">
            <button onclick="document.getElementById('roster-upload').click()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Select Screenshot</button>
            <div id="scan-status" class="hidden mt-6 flex items-center justify-center gap-3 p-4 bg-slate-50 rounded-xl">
                <div class="loading-spinner"></div>
                <span class="text-xs font-medium text-slate-600">Filtering legend items...</span>
            </div>
        </div>
    </div>

    <div id="view-deductions" class="hidden">
        <div class="bento-card p-5 mb-6">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="deduction-type" class="input-style text-xs">
                    <option>AHPRA Rego</option>
                    <option>Union Fees</option>
                    <option>Laundry</option>
                </select>
                <input type="number" id="deduction-cost" class="input-style" placeholder="$">
            </div>
            <button onclick="addDeduction()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Add Expense</button>
        </div>
        <div id="deduction-list" class="space-y-3"></div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('nurseShifts')) || [];
        let deductions = JSON.parse(localStorage.getItem('nurseDeductions')) || [];
        let savedConfig = JSON.parse(localStorage.getItem('nurseConfig')) || {};
        
        let config = {
            baseRate: 52.40,
            stdHours: { default: 8.0, night: 10.0 },
            penalties: { afternoon: 1.125, night: 1.15, saturday: 1.5, sunday: 1.75 },
            ...savedConfig
        };

        function calculateNet(grossAnnual) {
            const taxable = Math.max(0, grossAnnual);
            let tax = 0;
            if (taxable > 190000) tax = 51638 + (taxable - 190000) * 0.45;
            else if (taxable > 135000) tax = 31288 + (taxable - 135000) * 0.37;
            else if (taxable > 45000) tax = 4288 + (taxable - 45000) * 0.30;
            else if (taxable > 18200) tax = (taxable - 18200) * 0.16;
            return (taxable - tax - (taxable * 0.02));
        }

        function updateUI() {
            document.getElementById('base-rate-input').value = config.baseRate;
            document.getElementById('hours-default').value = config.stdHours.default;
            document.getElementById('hours-night').value = config.stdHours.night;
            document.getElementById('rate-afternoon').value = config.penalties.afternoon;
            document.getElementById('rate-night').value = config.penalties.night;
            document.getElementById('rate-saturday').value = config.penalties.saturday;
            document.getElementById('rate-sunday').value = config.penalties.sunday;

            const sList = document.getElementById('shift-list');
            sList.innerHTML = '';
            let totalGrossFortnight = 0;
            
            shifts.forEach((s, i) => {
                const mult = !isNaN(s.multiplier) ? parseFloat(s.multiplier) : (config.penalties[s.multiplier] || 1.0);
                const shiftGross = config.baseRate * mult * s.hours;
                totalGrossFortnight += shiftGross;
                sList.innerHTML += `<div class="bento-card p-4 flex justify-between items-center text-xs">
                    <div><b>${s.label}</b><br><span class="text-slate-400">${s.hours}h @ ${mult}x</span></div>
                    <div class="flex items-center gap-3"><b>$${shiftGross.toFixed(2)}</b><button onclick="deleteItem('shifts', ${i})">✕</button></div>
                </div>`;
            });

            const dList = document.getElementById('deduction-list');
            dList.innerHTML = '';
            let totalDeductions = 0;
            deductions.forEach((d, i) => {
                totalDeductions += d.cost;
                dList.innerHTML += `<div class="bento-card p-4 flex justify-between items-center text-xs border-l-4 border-emerald-400">
                    <div><b>${d.type}</b></div><div class="flex items-center gap-3"><b>$${d.cost.toFixed(2)}</b><button onclick="deleteItem('deductions', ${i})">✕</button></div>
                </div>`;
            });

            const netFortnight = calculateNet(totalGrossFortnight * 26) / 26;
            document.getElementById('total-display').innerText = "$" + netFortnight.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('shift-count').innerText = `${shifts.length} Shifts`;
            document.getElementById('tax-return-est').innerText = `$${(totalDeductions * 0.3).toFixed(0)} Refund Bonus`;

            localStorage.setItem('nurseShifts', JSON.stringify(shifts));
            localStorage.setItem('nurseDeductions', JSON.stringify(deductions));
            localStorage.setItem('nurseConfig', JSON.stringify(config));
        }

        async function handleRoster(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('scan-status').classList.remove('hidden');
            
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                const lines = text.toLowerCase().split('\n');
                let foundCount = 0;
                let currentDay = null;

                const rosterMap = [
                    { keys: ['day'], label: 'Day', val: 1.0, type: 'default' },
                    { keys: ['late', 'le'], label: 'Late', val: 'afternoon', type: 'default' },
                    { keys: ['night', '10night'], label: 'Night', val: 'night', type: 'night' }
                ];

                lines.forEach(line => {
                    // LEGEND FILTER: Skip lines with too many keywords (the top part of her screenshot)
                    const keywordCount = rosterMap.filter(p => p.keys.some(k => line.includes(k))).length;
                    if (keywordCount > 2) return; 

                    // DATE DETECTION: Only updates if a new standalone date is found
                    const dateMatch = line.match(/\b([1-9]|[12][0-9]|3[01])\b/);
                    if (dateMatch) currentDay = dateMatch[1];

                    // SHIFT DETECTION: Only add if we have an active date context
                    if (currentDay) {
                        rosterMap.forEach(p => {
                            if (p.keys.some(k => line.includes(k))) {
                                const shiftHours = (p.type === 'night') ? config.stdHours.night : config.stdHours.default;
                                shifts.push({ 
                                    label: `${p.label} (Jan ${currentDay})`, 
                                    dateNum: parseInt(currentDay),
                                    multiplier: p.val, 
                                    hours: shiftHours 
                                });
                                foundCount++;
                                currentDay = null; // Reset after finding shift for this day to prevent double-dipping
                            }
                        });
                    }
                });

                shifts.sort((a, b) => a.dateNum - b.dateNum);
                updateUI(); switchTab('shifts'); 
            } finally { document.getElementById('scan-status').classList.add('hidden'); }
        }

        function saveSettings() {
            config.baseRate = parseFloat(document.getElementById('base-rate-input').value);
            config.stdHours = { default: parseFloat(document.getElementById('hours-default').value), night: parseFloat(document.getElementById('hours-night').value) };
            config.penalties = {
                afternoon: parseFloat(document.getElementById('rate-afternoon').value),
                night: parseFloat(document.getElementById('rate-night').value),
                saturday: parseFloat(document.getElementById('rate-saturday').value),
                sunday: parseFloat(document.getElementById('rate-sunday').value)
            };
            localStorage.setItem('nurseConfig', JSON.stringify(config));
            updateUI(); toggleSidebar();
        }

        function resetApp() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }
        function clearShifts() { if(confirm("Clear shifts?")) { shifts = []; updateUI(); } }
        function addShift() {
            const h = document.getElementById('shift-hours').value;
            const type = document.getElementById('shift-type').value;
            if(!h) return;
            shifts.push({ 
                label: document.getElementById('shift-type').options[document.getElementById('shift-type').selectedIndex].text, 
                multiplier: type, 
                hours: parseFloat(h),
                dateNum: 99 
            });
            document.getElementById('shift-hours').value = ''; updateUI();
        }
        function addDeduction() {
            const c = document.getElementById('deduction-cost').value;
            if(!c) return;
            deductions.push({ type: document.getElementById('deduction-type').value, cost: parseFloat(c) });
            document.getElementById('deduction-cost').value = ''; updateUI();
        }
        function switchTab(t) {
            document.getElementById('view-shifts').classList.toggle('hidden', t !== 'shifts');
            document.getElementById('view-roster').classList.toggle('hidden', t !== 'roster');
            document.getElementById('view-deductions').classList.toggle('hidden', t !== 'deductions');
            document.getElementById('tab-shifts').className = t === 'shifts' ? "text-xs font-bold border-b-2 border-slate-900 pb-2" : "text-xs font-bold text-slate-400 pb-2";
            document.getElementById('tab-roster').className = t === 'roster' ? "text-xs font-bold border-b-2 border-slate-900 pb-2" : "text-xs font-bold text-slate-400 pb-2";
            document.getElementById('tab-deductions').className = t === 'deductions' ? "text-xs font-bold border-b-2 border-slate-900 pb-2" : "text-xs font-bold text-slate-400 pb-2";
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('opacity-0'); document.getElementById('sidebar-overlay').classList.toggle('pointer-events-none'); }
        function deleteItem(arr, i) { if(arr === 'shifts') shifts.splice(i, 1); else deductions.splice(i, 1); updateUI(); }
        window.onload = updateUI;
    </script>
</body>
</html>
