<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NursePay Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #F8FAFC; }
        .bento-card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #F1F5F9; }
        .input-style { background: #F1F5F9; border: none; border-radius: 12px; padding: 10px; width: 100%; outline: none; font-size: 14px; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.3s; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-5 max-w-md mx-auto pb-32">

    <header class="flex justify-between items-center mb-6 mt-4">
        <div>
            <h1 class="text-2xl font-bold">NursePay <span class="text-blue-500 text-sm">PRO</span></h1>
            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">2026 Audit Tool</p>
        </div>
        <button onclick="toggleSidebar()" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">⚙️</button>
    </header>

    <div class="bento-card p-8 mb-6 text-center border-b-4 border-blue-500">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fortnightly Take-Home</span>
        <div id="total-display" class="text-5xl font-bold text-slate-900 my-2 tracking-tighter">$0.00</div>
        <div class="flex justify-center gap-2 mt-2">
            <span id="shift-count" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">0 Shifts</span>
        </div>
    </div>

    <div id="view-shifts">
        <div class="flex justify-between items-center mb-4 px-1">
            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Current Audit</h4>
            <button onclick="clearShifts()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Clear All</button>
        </div>
        <div id="shift-list" class="space-y-3 mb-6"></div>
        
        <div class="bento-card p-6 text-center bg-blue-50/50 border-dashed border-2 border-blue-200">
            <input type="file" id="roster-upload" accept="image/*" class="hidden" onchange="handleRoster(event)">
            <button onclick="document.getElementById('roster-upload').click()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg active:scale-95 transition-all w-full">Scan Roster Image</button>
            <div id="scan-status" class="hidden mt-4 flex items-center justify-center gap-2">
                <div class="loading-spinner"></div>
                <span class="text-xs font-bold text-blue-600">Mapping Grid...</span>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 overlay opacity-0 pointer-events-none z-40"></div>
    <div id="sidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl sidebar translate-x-full p-6 overflow-y-auto z-50">
        <h2 class="text-xl font-bold mb-6">Settings</h2>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase">Base Hourly Rate</label>
                <input type="number" id="base-rate-input" class="input-style font-bold">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">Day Hrs</label><input type="number" id="hours-default" class="input-style"></div>
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">Night Hrs</label><input type="number" id="hours-night" class="input-style"></div>
            </div>
            <button onclick="saveSettings()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl mt-4">Save Configuration</button>
        </div>
    </div>

    <script>
        let shifts = JSON.parse(localStorage.getItem('nurseShifts')) || [];
        let config = { 
            baseRate: 52.40, 
            stdHours: { default: 8.0, night: 10.0 },
            penalties: { afternoon: 1.125, night: 1.15, saturday: 1.5, sunday: 1.75 },
            ...JSON.parse(localStorage.getItem('nurseConfig')) 
        };

        function updateUI() {
            document.getElementById('base-rate-input').value = config.baseRate;
            document.getElementById('hours-default').value = config.stdHours.default;
            document.getElementById('hours-night').value = config.stdHours.night;

            const list = document.getElementById('shift-list');
            list.innerHTML = '';
            let totalGross = 0;

            shifts.forEach((s, i) => {
                const mult = config.penalties[s.type] || 1.0;
                const gross = config.baseRate * mult * s.hours;
                totalGross += gross;
                list.innerHTML += `<div class="bento-card p-4 flex justify-between items-center text-xs">
                    <div><b>${s.label}</b><br><span class="text-slate-400">${s.hours}h @ ${mult}x</span></div>
                    <div class="flex items-center gap-3"><b>$${gross.toFixed(2)}</b><button onclick="deleteShift(${i})">✕</button></div>
                </div>`;
            });

            // Very simple tax approximation for take-home
            const tax = totalGross > 1000 ? 0.25 : 0.15;
            const net = totalGross * (1 - tax);
            document.getElementById('total-display').innerText = "$" + net.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('shift-count').innerText = `${shifts.length} Shifts Found`;
            
            localStorage.setItem('nurseShifts', JSON.stringify(shifts));
            localStorage.setItem('nurseConfig', JSON.stringify(config));
        }

        async function handleRoster(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('scan-status').classList.remove('hidden');

            try {
                // We use 'word' level data to find where the text is located on the page
                const { data } = await Tesseract.recognize(file, 'eng');
                const words = data.words; 
                
                // 1. Filter out the legend (words at the very top of the image)
                const filteredWords = words.filter(w => w.bbox.y0 > 150); 

                let foundCount = 0;
                const codes = [
                    { keys: ['day'], label: 'Day', type: 'default' },
                    { keys: ['late', 'le'], label: 'Late', type: 'afternoon' },
                    { keys: ['night', '10night'], label: 'Night', type: 'night' }
                ];

                // 2. Loop through every word to find shift keywords
                filteredWords.forEach((wordObj, index) => {
                    const text = wordObj.text.toLowerCase();
                    
                    codes.forEach(code => {
                        if (code.keys.some(k => text.includes(k))) {
                            // 3. Search backwards from this word to find the nearest date number
                            let dateFound = "??";
                            for (let i = index; i >= Math.max(0, index - 10); i--) {
                                const possibleDate = filteredWords[i].text.match(/\b([1-9]|[12][0-9]|3[01])\b/);
                                if (possibleDate) {
                                    dateFound = possibleDate[0];
                                    break;
                                }
                            }

                            const hours = (code.type === 'night') ? config.stdHours.night : config.stdHours.default;
                            shifts.push({
                                label: `${code.label} (Jan ${dateFound})`,
                                dateNum: parseInt(dateFound) || 99,
                                type: code.type,
                                hours: hours
                            });
                            foundCount++;
                        }
                    });
                });

                shifts.sort((a, b) => a.dateNum - b.dateNum);
                updateUI();
                if (foundCount === 0) alert("No shifts detected. Try a closer crop of the calendar grid.");
            } catch (err) {
                alert("Scan failed. Error: " + err.message);
            } finally {
                document.getElementById('scan-status').classList.add('hidden');
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('opacity-0'); document.getElementById('sidebar-overlay').classList.toggle('pointer-events-none'); }
        function saveSettings() {
            config.baseRate = parseFloat(document.getElementById('base-rate-input').value) || 52.40;
            config.stdHours.default = parseFloat(document.getElementById('hours-default').value) || 8.0;
            config.stdHours.night = parseFloat(document.getElementById('hours-night').value) || 10.0;
            localStorage.setItem('nurseConfig', JSON.stringify(config));
            toggleSidebar(); updateUI();
        }
        function clearShifts() { shifts = []; updateUI(); }
        function deleteShift(i) { shifts.splice(i, 1); updateUI(); }
        window.onload = updateUI;
    </script>
</body>
</html>
