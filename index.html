<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    <style>
        /* ... previous styles ... */
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-5 max-w-md mx-auto pb-32">

    <div class="bento-card p-8 mb-6 text-center border-b-4 border-blue-500">
        <span id="display-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Fortnightly Take-Home</span>
        <div id="total-display" class="text-5xl font-bold text-slate-900 my-2 tracking-tighter">$0.00</div>
        <div class="flex justify-center gap-2 mt-2">
            <span id="shift-count" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">0 Shifts</span>
            <span id="tax-return-est" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">$0 Tax Bonus</span>
        </div>
    </div>

    <div class="flex gap-4 mb-4 px-2">
        <button onclick="switchTab('shifts')" id="tab-shifts" class="text-xs font-bold border-b-2 border-slate-900 pb-1">Manual Add</button>
        <button onclick="switchTab('roster')" id="tab-roster" class="text-xs font-bold text-slate-400 pb-1 flex items-center gap-1">Roster Scan <span class="premium-badge">AI</span></button>
        <button onclick="switchTab('deductions')" id="tab-deductions" class="text-xs font-bold text-slate-400 pb-1">Deductions</button>
    </div>

    <div id="view-roster" class="hidden">
        <div class="bento-card p-6 mb-6">
            <div class="text-center mb-4">
                <div class="bg-blue-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">📸</div>
                <h3 class="font-bold text-slate-800">Roster Scanner</h3>
                <p class="text-[10px] text-slate-400 px-4 mt-1">Upload your roster screenshot. We'll find your shifts and add them to your log automatically.</p>
            </div>
            
            <input type="file" id="roster-upload" accept="image/*" class="hidden" onchange="handleRoster(event)">
            <button onclick="document.getElementById('roster-upload').click()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                Scan Roster Image
            </button>

            <div id="scan-status" class="hidden mt-4 p-4 bg-slate-50 rounded-xl flex items-center gap-3">
                <div class="loading-spinner"></div>
                <span id="scan-text" class="text-xs font-medium text-slate-600">AI is reading your schedule...</span>
            </div>
        </div>
    </div>

    <div id="view-shifts">/* ... */</div>
    <div id="view-deductions" class="hidden">/* ... */</div>

    <script>
        // ... (Keep existing state and updateUI logic) ...

        async function handleRoster(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('scan-status');
            const scanText = document.getElementById('scan-text');
            statusDiv.classList.remove('hidden');
            
            trackEvent('roster_upload');

            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                parseRosterText(text);
            } catch (err) {
                alert("Scan failed. Try a clearer screenshot.");
            } finally {
                statusDiv.classList.add('hidden');
            }
        }

        function parseRosterText(text) {
            const lines = text.toLowerCase().split('\n');
            let shiftsFound = 0;

            // Simple Pattern Matching Logic
            // In a real production app, we would use more complex Regex
            const patterns = [
                { key: 'morning', label: 'Morning', mult: 1.0, hours: 8.5 },
                { key: 'afternoon', label: 'Afternoon', mult: 1.125, hours: 8.5 },
                { key: 'night', label: 'Night', mult: 1.15, hours: 10.0 },
                { key: 'saturday', label: 'Saturday', mult: 1.5, hours: 8.5 },
                { key: 'sunday', label: 'Sunday', mult: 1.75, hours: 8.5 }
            ];

            lines.forEach(line => {
                patterns.forEach(p => {
                    if (line.includes(p.key)) {
                        shifts.push({
                            label: `Auto: ${p.label}`,
                            multiplier: p.mult,
                            hours: p.hours
                        });
                        shiftsFound++;
                    }
                });
            });

            if (shiftsFound > 0) {
                alert(`Success! Found and added ${shiftsFound} shifts to your log.`);
                updateUI();
                switchTab('shifts');
                trackEvent('roster_parsed_success');
            } else {
                alert("Couldn't find any clear shifts. Make sure 'Morning', 'Afternoon', or 'Night' is visible.");
            }
        }

        function switchTab(t) {
            document.getElementById('view-shifts').classList.toggle('hidden', t !== 'shifts');
            document.getElementById('view-roster').classList.toggle('hidden', t !== 'roster');
            document.getElementById('view-deductions').classList.toggle('hidden', t !== 'deductions');
            // ... update tab button highlight logic ...
        }

        // ... existing updateUI and saveSettings logic ...
    </script>
</body>
</html>
